name: Deploy admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify build
        uses: actions/setup-node@v5
        with:
          node-version: "18"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:prod

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_SSH_KEY"

          PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${SERVER_DEPLOY_PATH:-/opt/xiaotuzi-kitchen/current}"
          ARCHIVE_NAME="xiaotuzi-admin-${GITHUB_SHA}.tgz"

          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/xiaotuzi_deploy_key
          chmod 600 ~/.ssh/xiaotuzi_deploy_key
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            -czf "/tmp/$ARCHIVE_NAME" .
          scp -i ~/.ssh/xiaotuzi_deploy_key -P "$PORT" "/tmp/$ARCHIVE_NAME" "$SERVER_USER@$SERVER_HOST:/tmp/$ARCHIVE_NAME"

          ssh -i ~/.ssh/xiaotuzi_deploy_key -p "$PORT" "$SERVER_USER@$SERVER_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' ARCHIVE_NAME='$ARCHIVE_NAME' bash -s" <<'EOF'
          set -euo pipefail

          TARGET_DIR="$DEPLOY_PATH/RuoYi-Vue3"
          rm -rf "$TARGET_DIR"
          mkdir -p "$TARGET_DIR"
          tar -xzf "/tmp/$ARCHIVE_NAME" -C "$TARGET_DIR"
          rm -f "/tmp/$ARCHIVE_NAME"

          cd "$DEPLOY_PATH"
          docker compose -f docker-compose.deploy.yml build admin
          docker compose -f docker-compose.deploy.yml up -d --no-deps admin
          for i in $(seq 1 20); do
            if curl -fsSI http://127.0.0.1:18080/ >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsSI http://127.0.0.1:18080/ >/dev/null
          CAPTCHA_RESPONSE="$(curl -fsS http://127.0.0.1:18080/prod-api/captchaImage)"
          printf '%s' "$CAPTCHA_RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['code']==200 and d.get('captchaEnabled') in (True,False); assert not d.get('captchaEnabled') or (d.get('uuid') and len(d.get('img',''))>100)"
          curl -fsS http://127.0.0.1:18080/prod-api/getInfo | grep -q '"code":401'
          docker compose -f docker-compose.deploy.yml ps
          EOF

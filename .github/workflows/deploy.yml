name: Deploy admin

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify build
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:prod

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_SSH_KEY"

          PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${SERVER_DEPLOY_PATH:-/opt/xiaotuzi-kitchen/current}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"

          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/xiaotuzi_deploy_key
          chmod 600 ~/.ssh/xiaotuzi_deploy_key
          ssh-keyscan -p "$PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/xiaotuzi_deploy_key -p "$PORT" "$SERVER_USER@$SERVER_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REPO_URL='$REPO_URL' bash -s" <<'EOF'
          set -euo pipefail

          retry() {
            for i in 1 2 3; do
              "$@" && return 0
              sleep $((i * 5))
            done
            "$@"
          }

          TARGET_DIR="$DEPLOY_PATH/RuoYi-Vue3"
          if [ -d "$TARGET_DIR/.git" ]; then
            retry git -C "$TARGET_DIR" fetch --prune origin main
            git -C "$TARGET_DIR" reset --hard origin/main
          else
            rm -rf "$TARGET_DIR"
            retry git clone --branch main --depth 1 "$REPO_URL" "$TARGET_DIR"
          fi

          cd "$DEPLOY_PATH"
          docker compose -f docker-compose.deploy.yml up -d --build admin
          for i in $(seq 1 20); do
            if curl -fsSI http://127.0.0.1:18080/ >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsSI http://127.0.0.1:18080/ >/dev/null
          docker compose -f docker-compose.deploy.yml ps
          EOF

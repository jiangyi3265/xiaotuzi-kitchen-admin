# 小兔子厨房 管理后台 Nginx 配置
# 托管 RuoYi-Vue3 dist；把管理端 API(/prod-api) 与小程序 API(/api/wx) 反代到后端。
server {
    listen       80;
    server_name  _;
    charset utf-8;

    # 管理后台前端静态资源（history 路由回退到 index.html）
    location / {
        root   /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index  index.html;
    }

    # 管理后台接口：/prod-api/xxx -> 后端 /xxx
    location /prod-api/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend:8080/;
    }

    # 小程序接口：/api/wx/xxx 原样反代到后端（小程序 config.baseUrl 指向本域名）
    location /api/wx/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://backend:8080/api/wx/;
    }

    # 上传文件访问（后端本地存储目录经后端静态映射 /profile）
    location /profile/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8080/profile/;
    }

    client_max_body_size 20m;
}
